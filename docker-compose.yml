services:
  postgres:
    image: postgres:15
    container_name: oidc-oauth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oidc-oauth
      POSTGRES_PASSWORD: oidc-oauth-1o1
      POSTGRES_DB: oidc-oauth-1o1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
